previews:
  generation: manual

services:
  - type: web
    runtime: node
    name: qianlu-events-web
    region: frankfurt
    plan: starter
    buildCommand: npm run render:build:web
    startCommand: npm run start:web
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: API_BASE_URL
        fromService:
          type: web
          name: qianlu-events-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: qianlu-events-api
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    runtime: node
    name: qianlu-events-api
    region: frankfurt
    plan: starter
    buildCommand: npm run render:build:api
    preDeployCommand: npm run render:predeploy:api
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qianlu-events-db
          property: connectionString
      - key: WEB_BASE_URL
        fromService:
          type: web
          name: qianlu-events-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEMO_WEB_BASE_URL
        fromService:
          type: web
          name: qianlu-events-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: STAFF_PIN
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_VERIFY_TOKEN
        sync: false

databases:
  - name: qianlu-events-db
    region: frankfurt
    plan: basic-256mb
    databaseName: qianlu_events
    user: qianlu_events
