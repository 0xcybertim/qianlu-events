services:
  db:
    image: postgres:16-alpine
    container_name: qianlu-events-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qianlu_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - qianlu-events-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qianlu_events"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  qianlu-events-postgres:

